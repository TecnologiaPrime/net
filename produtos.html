<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Produtos - Prime Acessórios & Informática</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      max-width: 100vw;
    }

    html, body {
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #f2cd00;
      color: #111;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 300;
    }

    header h1 {
      font-size: 2em;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .cart-icon {
      position: relative;
      font-size: 1.6em;
      color: #111;
      cursor: pointer;
    }

    .cart-count {
      background: red;
      color: #fff;
      font-size: 0.75em;
      border-radius: 50%;
      padding: 2px 6px;
      position: absolute;
      top: -10px;
      right: -10px;
    }

    .close-btn {
      font-size: 2em;
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    .close-btn:hover {
      color: #000;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(255, 215, 0, 0.3);
    }

    .product-card img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .product-card h3 {
      margin-bottom: 10px;
      color: #f2cd00;
      font-size: 1.2em;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .controls input[type="number"] {
      width: 60px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }

    .controls button {
      background-color: #f2cd00;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background-color: #e0bc00;
    }

    footer {
      background-color: #f1f1f1;
      color: #111;
      text-align: center;
      padding: 20px 15px;
      border-top: 3px solid #f2cd00;
      margin-top: 40px;
      font-size: 0.9em;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5em;
      }

      .product-card h3 {
        font-size: 1em;
      }

      footer {
        font-size: 0.75em;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Produtos</h1>
    <div class="header-right">
      <div class="cart-icon">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cart-count">0</span>
      </div>
      <a href="index.html" class="close-btn" title="Voltar">&times;</a>
    </div>
  </header>

  <main>
    <div class="product-grid">
      <!-- Produto 1 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x180.png?text=Produto+1" alt="Produto 1" />
        <h3>Produto 1</h3>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this)">Adicionar</button>
        </div>
      </div>

      <!-- Produto 2 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x180.png?text=Produto+2" alt="Produto 2" />
        <h3>Produto 2</h3>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this)">Adicionar</button>
        </div>
      </div>

      <!-- Produto 3 -->
      <div class="product-card">
        <img src="https://via.placeholder.com/250x180.png?text=Produto+3" alt="Produto 3" />
        <h3>Produto 3</h3>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this)">Adicionar</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Prime Acessórios & Informática. Todos os direitos reservados.</p>
  </footer>

  <script>
    function adicionarAoCarrinho(botao) {
      const input = botao.previousElementSibling;
      const quantidade = parseInt(input.value) || 1;
      const carrinho = document.getElementById("cart-count");
      const atual = parseInt(carrinho.textContent);
      carrinho.textContent = atual + quantidade;
    }
  </script>

</body>
</html>
