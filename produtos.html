<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>E-Commerce - Prime Acessórios & Informática</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      max-width: 100vw;
    }

    html, body {
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #f2cd00;
      color: #111;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 300;
    }

    header h1 {
      font-size: 2em;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cart-icon {
      position: relative;
      font-size: 1.6em;
      color: #111;
      cursor: pointer;
    }

    .cart-count {
      background: red;
      color: #fff;
      font-size: 0.75em;
      border-radius: 50%;
      padding: 2px 6px;
      position: absolute;
      top: -10px;
      right: -10px;
    }

    .close-btn {
      font-size: 2em;
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    .close-btn:hover {
      color: #000;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(255, 215, 0, 0.3);
    }

    .product-card img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .product-card h3 {
      margin-bottom: 10px;
      color: #f2cd00;
      font-size: 1.2em;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .controls input[type="number"] {
      width: 60px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }

    .controls button {
      background-color: #f2cd00;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background-color: #e0bc00;
    }

    footer {
      background-color: #f1f1f1;
      color: #111;
      text-align: center;
      padding: 20px 15px;
      border-top: 3px solid #f2cd00;
      margin-top: 40px;
      font-size: 0.9em;
    }

    #cart-sidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: 300px;
      height: 100vh;
      background: #fff;
      box-shadow: -2px 0 8px rgba(0,0,0,0.3);
      padding: 200px;
      z-index: 1000;
      transition: right 0.3s ease;
    }

    #cart-sidebar.active {
      right: 0;
    }

    #cart-items {
      margin-top: 20px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .cart-item span {
      font-size: 0.9em;
    }

    .cart-item i {
      color: red;
      cursor: pointer;
    }

    #finalizar {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #f2cd00;
      border: none;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    #cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }

    #cart-overlay.active {
      display: block;
    }

    #zoom-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #zoom-img img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5em;
      }

      .product-card h3 {
        font-size: 1em;
      }

      footer {
        font-size: 0.75em;
      }
    }
  

    #search-input {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 0.9em;
  width: 130px;
  max-width: 200%;
  box-sizing: border-box;
  transition: width 0.3s ease;
  margin-left: 1px; /* Reduz o espaço entre o título e o input */
}

  </style>
</head>
<body>

  <header>
  <h1>Produtos</h1>
  <div class="header-right">
    <input type="text" id="search-input" placeholder="Buscar produto..." oninput="filtrarProdutos()" />
    <div class="cart-icon" onclick="toggleCarrinho()">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-count" id="cart-count">0</span>
    </div>
    <a href="index.html" class="close-btn" title="Voltar">&times;</a>
  </div>
</header>

  <main>
    <div class="product-grid">
      <div class="product-card">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczOTeHKnf2J-V-2ppPOk6DvSvOyt5R02xHdbMulf1y8aklnIyst0BILtwkUp7bnKZJOF9cp46Y8lCUNkF4HMfpnlj7Jl4Dp0ZXMrnn-qrAZqTeQK6hH24YwksnlxBNTVZKJ3vPBqaDzTw_MEgvRa4ns=w685-h913-s-no-gm?authuser=0" alt="STANLEY ROSA 950ML" onclick="zoomImagem(this.src)" />
        <h3>STANLEY ROSA 950ML</h3>
        <p class="price">R$ 79,90</p>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this, 'STANLEY ROSA 950ML')">Adicionar</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczPgrSqhuacKzmESve6-qMdWfSk7r2uTbx0rdXUauZ4riDN9vnp3UpS18G_GH5JhGM77bJSu_INkAlsDaYNUuvshGkBC1oFK4Tk0hfXChgxuxBMHWY8BB0w4UeEGzus9A7f2DkpffLMVWb1_TNBqiok=w685-h913-s-no-gm?authuser=0" alt="STANLEY ROXO 950ML" onclick="zoomImagem(this.src)" />
        <h3>STANLEY ROXO 950ML</h3>
        <p class="price">R$ 79,90</p>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this, 'STANLEY ROXO 950ML')">Adicionar</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczNgwGnuV7zTEu6ZnoVOTcyoe6gBXsJ2ADTh_NeTX8XUHATXZf5X5ONN1QqldkZAFeh9e8vb3jO8-ldgS6Xpal-HdOXQfGASzfIWdr1djfnCW4_BQtbtAzDMYc-FnWKe_8lNAScakfQjeAVS_0E2TaY=w685-h913-s-no-gm?authuser=0" alt="STANLEY AZUL 950ML" onclick="zoomImagem(this.src)" />
        <h3>STANLEY AZUL 950ML</h3>
        <p class="price">R$ 79,90</p>
        <div class="controls">
          <input type="number" min="1" value="1" />
          <button onclick="adicionarAoCarrinho(this, 'STANLEY AZUL 950ML')">Adicionar</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Prime Acessórios & Informática. Todos os direitos reservados.</p>
  </footer>

  <!-- Zoom da imagem -->
  <div id="zoom-img" onclick="fecharZoom()">
    <img id="zoomed" src="" />
  </div>

 <!-- Overlay -->
<div id="cart-overlay" onclick="fecharCarrinho()"></div>

<!-- Carrinho lateral -->
<div id="cart-sidebar">
  <div class="cart-header">
    <h3>Resumo do Pedido</h3>
    <button onclick="fecharCarrinho()">✖</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <button id="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
  </div>
</div>

<!-- Estilos do carrinho -->
<style>
  /* Overlay escurecido ao fundo */
  #cart-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.4);
    display: none;
    z-index: 999;
  }

  /* Sidebar do carrinho */
  #cart-sidebar {
  position: fixed;
  top: 0;
  right: -350px;
  width: 320px;
  height: 100%;
  background-color: #fff;
  box-shadow: -3px 0 8px rgba(0, 0, 0, 0.2);
  padding: 20px;
  z-index: 1000;
  transition: right 0.3s ease-in-out;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

#cart-sidebar.active {
  right: 0;
}

#cart-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;
  z-index: 999;
}

#cart-overlay.active {
  display: block;
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.cart-header h3 {
  font-size: 1.3em;
  color: #111;
}

.cart-header button {
  background: transparent;
  border: none;
  font-size: 1.4em;
  cursor: pointer;
  color: #111;
}

#cart-items {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
}

#cart-sidebar button#finalizar {
  margin-top: 5px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f9f9f9;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 0.95em;
}

.cart-item i {
  color: red;
  cursor: pointer;
  transition: color 0.2s ease;
}

.cart-item i:hover {
  color: darkred;
}

#cart-sidebar button#finalizar {
  background-color: #f2cd00;
  color: #111;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 1em;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

#cart-sidebar button#finalizar:hover {
  background-color: #e0bc00;
}
</style>

<!-- JavaScript do carrinho -->
<script>
  const carrinhoSidebar = document.getElementById("cart-sidebar");
  const carrinhoOverlay = document.getElementById("cart-overlay");

  // Recupera carrinho salvo no localStorage
  let carrinhoSalvo = localStorage.getItem('carrinho');
  const carrinho = carrinhoSalvo ? JSON.parse(carrinhoSalvo) : [];

  atualizarContador();
  renderizarCarrinho();

  function adicionarAoCarrinho(botao, nome) {
    const input = botao.previousElementSibling;
    const quantidade = parseInt(input.value) || 1;
    const card = botao.closest('.product-card');
    const precoText = card.querySelector('.price').textContent;
    const preco = parseFloat(precoText.replace('R$', '').replace(',', '.'));

    const item = carrinho.find(p => p.nome === nome);
    if (item) {
      item.qtd += quantidade;
    } else {
      carrinho.push({ nome, qtd: quantidade, preco });
    }
    atualizarContador();
    renderizarCarrinho();
  }

  function atualizarContador() {
    const total = carrinho.reduce((acc, item) => acc + item.qtd, 0);
    document.getElementById("cart-count").textContent = total;
  }

  function renderizarCarrinho() {
    const container = document.getElementById("cart-items");
    container.innerHTML = "";
    carrinho.forEach((item, index) => {
      const totalItem = (item.preco * item.qtd).toFixed(2).replace('.', ',');
      const div = document.createElement("div");
      div.className = "cart-item";
      div.innerHTML = `<span>${item.nome} x${item.qtd} - R$ ${totalItem}</span><i class="fas fa-trash" onclick="removerItem(${index})"></i>`;
      container.appendChild(div);
    });

    localStorage.setItem('carrinho', JSON.stringify(carrinho));
  }

  function removerItem(index) {
    carrinho.splice(index, 1);
    atualizarContador();
    renderizarCarrinho();
  }

  function finalizarPedido() {
    if (carrinho.length === 0) {
      alert("Seu carrinho está vazio.");
      return;
    }

    let mensagem = "Olá! Gostaria de fazer o seguinte pedido:%0A";
    let total = 0;

    carrinho.forEach(item => {
      const subtotal = (item.preco * item.qtd).toFixed(2).replace('.', ',');
      mensagem += `- ${item.nome} (Qtd: ${item.qtd}) - R$ ${subtotal}%0A`;
      total += item.preco * item.qtd;
    });

    mensagem += `%0ATotal: R$ ${total.toFixed(2).replace('.', ',')}`;

    // Enviar para WhatsApp
    const numero = "5579996269748"; // Número com DDI e DDD
    const url = `https://wa.me/${numero}?text=${mensagem}`;
    window.open(url, "_blank");

    // Limpar carrinho
    carrinho.length = 0;
    atualizarContador();
    renderizarCarrinho();
    fecharCarrinho();
  }

  function toggleCarrinho() {
    carrinhoSidebar.classList.add("active");
    carrinhoOverlay.classList.add("active");
    renderizarCarrinho();
  }

  function fecharCarrinho() {
    carrinhoSidebar.classList.remove("active");
    carrinhoOverlay.classList.remove("active");
  }

  function zoomImagem(src) {
    document.getElementById("zoomed").src = src;
    document.getElementById("zoom-img").style.display = "flex";
  }

  function fecharZoom() {
    document.getElementById("zoom-img").style.display = "none";
  }

  function filtrarProdutos() {
    const termo = document.getElementById("search-input").value.toLowerCase();
    const cards = document.querySelectorAll(".product-card");

    cards.forEach(card => {
      const titulo = card.querySelector("h3").textContent.toLowerCase();
      card.style.display = titulo.includes(termo) ? "block" : "none";
    });
  }
</script>
</body>
</html>
